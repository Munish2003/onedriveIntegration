<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — SalezX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a40 40%, #302b63 100%);
            color: #fff;
            overflow-x: hidden;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 8s ease-in-out infinite;
            z-index: 0;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #6c63ff;
            top: -100px;
            right: -100px;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: #00d2ff;
            bottom: -50px;
            left: -50px;
            animation-delay: -4s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -20px) scale(1.05);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.95);
            }
        }

        .navbar {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 40px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .navbar .brand {
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar .brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #6c63ff, #00d2ff);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .navbar .brand-icon svg {
            width: 16px;
            height: 16px;
            fill: #fff;
        }

        .logout-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 80, 80, 0.15);
            border-color: rgba(255, 80, 80, 0.3);
        }

        .main {
            position: relative;
            z-index: 5;
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 24px;
            animation: fade-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(24px);
        }

        @keyframes fade-up {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .greeting {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .greeting span {
            color: #00d2ff;
        }

        .greeting-sub {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 24px;
            transition: transform 0.25s ease, border-color 0.25s ease;
        }

        .info-card:hover {
            transform: translateY(-4px);
            border-color: rgba(108, 99, 255, 0.3);
        }

        .info-card .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 8px;
        }

        .info-card .value {
            font-size: 1rem;
            font-weight: 600;
            word-break: break-all;
        }

        .info-card .icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .icon-name {
            background: rgba(108, 99, 255, 0.15);
        }

        .icon-email {
            background: rgba(0, 210, 255, 0.15);
        }

        .icon-id {
            background: rgba(255, 111, 216, 0.15);
        }

        .icon-tenant {
            background: rgba(0, 200, 83, 0.15);
            color: #69f0ae;
        }

        .status-bar {
            margin-top: 32px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(0, 200, 83, 0.1);
            border: 1px solid rgba(0, 200, 83, 0.2);
            border-radius: 50px;
            font-size: 0.85rem;
            color: #69f0ae;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #69f0ae;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #6c63ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .onedrive-section {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .onedrive-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .onedrive-title {
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .onedrive-title svg {
            width: 24px;
            height: 24px;
            fill: #0078D4;
        }

        .connect-btn {
            padding: 10px 24px;
            background: #0078D4;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 120, 212, 0.3);
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .connect-btn:hover {
            background: #0086F0;
            transform: translateY(-2px);
            color: #fff;
            text-decoration: none;
        }

        /* Premium Folder Picker UI */
        .folder-setup-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 32px;
        }

        .folder-setup-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #fff;
        }

        .folder-setup-desc {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .folder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .folder-grid::-webkit-scrollbar {
            width: 6px;
        }

        .folder-grid::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .folder-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .folder-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .folder-item.selected {
            background: rgba(0, 120, 212, 0.15);
            border-color: #0078D4;
            box-shadow: 0 4px 15px rgba(0, 120, 212, 0.2);
        }

        .folder-icon {
            font-size: 32px;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
        }

        .folder-name {
            font-weight: 600;
            font-size: 0.95rem;
            word-break: break-word;
            color: #fff;
            margin-bottom: 4px;
        }

        .folder-meta {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .action-row {
            display: flex;
            justify-content: flex-end;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-submit {
            padding: 12px 32px;
            background: #0078D4;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            opacity: 0.5;
            pointer-events: none;
            transition: all 0.2s;
        }

        .btn-submit.active {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-submit.active:hover {
            background: #0086F0;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 120, 212, 0.3);
        }

        /* Connected Files UI */
        .connected-banner {
            background: rgba(0, 200, 83, 0.1);
            border: 1px solid rgba(0, 200, 83, 0.2);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .file-list {
            margin-top: 24px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .file-icon-small {
            font-size: 1.5rem;
            margin-right: 16px;
        }

        .file-name-small {
            font-weight: 500;
            font-size: 0.95rem;
            color: #fff;
        }

        .file-meta-small {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            margin-top: 4px;
        }

        .download-btn {
            color: #64B5F6;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(100, 181, 246, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .download-btn:hover {
            background: rgba(100, 181, 246, 0.2);
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <nav class="navbar">
        <div class="brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                </svg>
            </div>
            SalezX
        </div>
        <a href="/auth/logout" class="logout-btn">Sign out</a>
    </nav>

    <div class="main" id="main-content">
        <div style="text-align: center; padding: 80px 0;">
            <div class="spinner"></div>
            <div style="color: rgba(255,255,255,0.5);">Loading your profile...</div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let selectedFolderInfo = null;

        async function loadUser() {
            try {
                const res = await fetch("/api/me");
                if (!res.ok) { window.location.href = "/"; return; }
                const user = await res.json();
                currentUser = user;

                // Log user info to console instead of showing on screen
                console.log("Logged in user details:", {
                    name: user.name,
                    email: user.email,
                    ms_id: user.ms_id,
                    tenant_id: user.tenant_id
                });

                document.getElementById("main-content").innerHTML = `
                    <h1 class="greeting">Welcome back, <span>${user.name || "User"}</span> 👋</h1>
                    <p class="greeting-sub">You're signed in securely with Microsoft Identity.</p>

                    <div class="status-bar">
                        <div class="status-dot"></div>
                        Authenticated & Active
                    </div>

                    <div class="onedrive-section">
                        <div class="onedrive-header">
                            <div class="onedrive-title">
                                <svg viewBox="0 0 24 24"><path d="M19.14 7.5A4.5 4.5 0 0 0 10.5 7v.2A4.2 4.2 0 0 0 8.2 6.5a4.3 4.3 0 0 0-4.3 4.3c0 .35.05.69.13 1.03A5 5 0 0 0 2 16.5 4.5 4.5 0 0 0 6.5 21h11a4.5 4.5 0 0 0 4.5-4.5 4.5 4.5 0 0 0-2.86-4z" fill="#0078D4"/></svg>
                                OneDrive Integration
                            </div>
                        </div>
                        <div id="onedrive-content"></div>
                    </div>
                `;

                if (user.connected_folders && user.connected_folders.length > 0) {
                    showConnectedUI();
                } else {
                    showFolderPicker();
                }

            } catch (err) {
                console.error("Failed to load user:", err);
                window.location.href = "/";
            }
        }

        let allFoldersList = [];
        let folderPickerMode = 'specific'; // 'full' or 'specific'

        async function showFolderPicker() {
            const container = document.getElementById("onedrive-content");
            container.innerHTML = `
                <style>
                    .sync-modal {
                        background: #252526;
                        border-radius: 12px;
                        padding: 32px;
                        max-width: 600px;
                        margin: 0 auto;
                        position: relative;
                        color: #fff;
                        font-family: 'Segoe UI', 'Inter', sans-serif;
                        border: 1px solid rgba(255,255,255,0.1);
                        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
                    }
                    .modal-close {
                        position: absolute;
                        top: 24px;
                        right: 24px;
                        background: none;
                        border: none;
                        color: #a0a0a0;
                        font-size: 20px;
                        cursor: pointer;
                    }
                    .sync-modal h2 { font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; }
                    .sync-modal p { font-size: 0.95rem; color: #b0b0b0; margin-bottom: 24px; }
                    
                    .option-card {
                        border: 1px solid rgba(255,255,255,0.1);
                        border-radius: 8px;
                        padding: 16px;
                        margin-bottom: 16px;
                        cursor: pointer;
                        transition: all 0.2s;
                        background: #2d2d30;
                        position: relative;
                    }
                    .option-card.selected {
                        border-color: #5c5cff;
                        background: rgba(92, 92, 255, 0.05);
                    }
                    .option-header {
                        display: flex;
                        align-items: center;
                        gap: 12px;
                        margin-bottom: 6px;
                    }
                    /* Custom Radio */
                    .radio-outer {
                        width: 20px; height: 20px; border-radius: 50%; border: 2px solid #888;
                        display: flex; align-items: center; justify-content: center; flex-shrink: 0;
                    }
                    .option-card.selected .radio-outer { border-color: #5c5cff; }
                    .radio-inner {
                        width: 10px; height: 10px; border-radius: 50%; background: transparent; transition: 0.2s;
                    }
                    .option-card.selected .radio-inner { background: #5c5cff; }
                    
                    .option-title { font-weight: 600; font-size: 1rem; color: #fff; }
                    .option-desc { font-size: 0.85rem; color: #a0a0a0; margin-left: 32px; }
                    
                    .folder-select-area {
                        margin-left: 32px;
                        margin-top: 16px;
                        display: none;
                    }
                    .option-card.selected .folder-select-area {
                        display: block;
                    }
                    
                    .search-input {
                        width: 100%;
                        background: #1e1e1e;
                        border: 1px solid rgba(255,255,255,0.1);
                        color: #fff;
                        padding: 10px 16px 10px 36px;
                        border-radius: 6px;
                        font-size: 0.9rem;
                        margin-bottom: 12px;
                        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>');
                        background-repeat: no-repeat;
                        background-position: 12px center;
                    }
                    
                    .folder-list {
                        max-height: 200px;
                        overflow-y: auto;
                        border-radius: 6px;
                    }
                    .folder-list::-webkit-scrollbar { width: 6px; }
                    .folder-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
                    
                    .folder-row {
                        display: flex;
                        align-items: center;
                        padding: 8px 0;
                        gap: 12px;
                        cursor: pointer;
                    }
                    .folder-row:hover { background: rgba(255,255,255,0.02); }
                    .folder-checkbox {
                        width: 18px; height: 18px;
                        border: 1px solid #888;
                        border-radius: 4px;
                        display: flex; align-items: center; justify-content: center;
                        background: transparent;
                        flex-shrink: 0;
                    }
                    .folder-checkbox.checked {
                        background: #5c5cff;
                        border-color: #5c5cff;
                    }
                    .folder-checkbox.checked::after {
                        content: '';
                        width: 4px; height: 8px;
                        border: solid white;
                        border-width: 0 2px 2px 0;
                        transform: rotate(45deg);
                        margin-top: -2px;
                    }
                    
                    .info-box {
                        background: rgba(92, 92, 255, 0.1);
                        border-radius: 8px;
                        padding: 12px 16px;
                        display: flex;
                        gap: 12px;
                        align-items: flex-start;
                        margin-top: 16px;
                        color: #b0b0b0;
                        font-size: 0.9rem;
                    }
                    
                    .modal-footer {
                        display: flex;
                        justify-content: flex-end;
                        gap: 12px;
                        margin-top: 32px;
                    }
                    .btn-cancel {
                        background: transparent;
                        color: #5c5cff;
                        border: 1px solid transparent;
                        padding: 10px 20px;
                        border-radius: 6px;
                        font-weight: 600;
                        cursor: pointer;
                    }
                    .btn-cancel:hover { background: rgba(92, 92, 255, 0.1); }
                    .btn-continue {
                        background: #5c5cff;
                        color: #fff;
                        border: none;
                        padding: 10px 20px;
                        border-radius: 6px;
                        font-weight: 600;
                        cursor: pointer;
                    }
                    .btn-continue:hover { background: #4a4ae6; }
                    .btn-continue:disabled { opacity: 0.5; cursor: not-allowed; }
                </style>
                
                <div class="sync-modal">
                    <button class="modal-close" onclick="window.location.reload()">✕</button>
                    <h2>Choose How to Sync Your OneDrive Files</h2>
                    <p>Connect OneDrive with the level of access you prefer:</p>
                    
                    <!-- Option 1: Full Access -->
                    <div class="option-card" id="opt-full" onclick="setSyncMode('full')">
                        <div class="option-header">
                            <div class="radio-outer"><div class="radio-inner"></div></div>
                            <div class="option-title" style="display:flex;align-items:center;gap:8px;">
                                Full access <span style="font-size:0.75rem;background:rgba(255,255,255,0.1);padding:3px 8px;border-radius:12px;color:#ccc;">Recommended</span>
                            </div>
                        </div>
                        <div class="option-desc">
                            Sync your entire OneDrive so SalezX can include all your files.
                        </div>
                        <div class="folder-select-area" id="area-full">
                            <div class="folder-list" id="list-full-folders" style="margin-top: 12px;">
                                <div style="padding:10px;text-align:center;font-size:0.85rem;">Loading folders...</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Option 2: Select folders only -->
                    <div class="option-card selected" id="opt-specific" onclick="setSyncMode('specific')">
                        <div class="option-header">
                            <div class="radio-outer"><div class="radio-inner"></div></div>
                            <div class="option-title">Select folders only</div>
                        </div>
                        <div class="option-desc">
                            Choose specific folders to sync — SalezX will only access what you select.
                        </div>
                        <div class="folder-select-area" id="area-specific">
                            <div style="margin-bottom: 8px; font-size: 0.9rem; font-weight: 600;">Select folders to sync</div>
                            <input type="text" class="search-input" id="folder-search" placeholder="Search folders" oninput="filterFolders()">
                            <div class="folder-list" id="list-folders">
                                <div style="padding:10px;text-align:center;font-size:0.85rem;">Loading folders...</div>
                            </div>
                            <div class="info-box" style="margin-top:8px;">
                                <div style="color:#5c5cff;font-weight:bold;font-size:1.1rem;margin-top:-2px;">ⓘ</div>
                                <div>Only selected folders will be synced.</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="info-box" id="general-info-box" style="display:none;">
                        <div style="color:#5c5cff;font-weight:bold;font-size:1.1rem;margin-top:-2px;">ⓘ</div>
                        <div>You can update your preferences anytime from your integration settings.</div>
                    </div>
                    
                    <div class="modal-footer">
                        <button class="btn-cancel" onclick="window.location.reload()">Cancel</button>
                        <button class="btn-continue" id="btn-submit-folders" onclick="submitFolderTarget()">Continue</button>
                    </div>
                </div>
            `;

            // Default to specific mode
            setSyncMode('specific');

            try {
                const res = await fetch("/api/onedrive/folders");
                const data = await res.json();

                if (data.folders) {
                    allFoldersList = data.folders.map(f => ({ ...f, checked: false }));
                    renderFolders();
                } else {
                    document.getElementById('list-folders').innerHTML = '<div style="padding:10px;color:red;">Error loading folders.</div>';
                    document.getElementById('list-full-folders').innerHTML = '<div style="padding:10px;color:red;">Error loading folders.</div>';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('list-folders').innerHTML = '<div style="padding:10px;color:red;">Error loading folders.</div>';
            }
        }

        function setSyncMode(mode) {
            folderPickerMode = mode;
            if (mode === 'full') {
                document.getElementById('opt-full').classList.add('selected');
                document.getElementById('opt-specific').classList.remove('selected');

                if (allFoldersList.length > 0) {
                    allFoldersList.forEach(f => f.checked = true);
                    renderFolders();
                }
            } else {
                document.getElementById('opt-specific').classList.add('selected');
                document.getElementById('opt-full').classList.remove('selected');

                if (allFoldersList.length > 0) {
                    allFoldersList.forEach(f => f.checked = false);
                    renderFolders();
                }
            }
            updateSubmitButton();
        }

        function toggleFolder(id) {
            const folder = allFoldersList.find(f => f.id === id);
            if (folder) {
                folder.checked = !folder.checked;
                renderFolders();
                updateSubmitButton();
            }
        }

        function filterFolders() {
            renderFolders();
        }

        function renderFolders() {
            const query = (document.getElementById('folder-search')?.value || '').toLowerCase();

            let html = '';
            let fullHtml = '';

            allFoldersList.forEach(f => {
                const isVisible = f.name.toLowerCase().includes(query);
                const checkedClass = f.checked ? 'checked' : '';

                const rowHtml = `
                    <div class="folder-row" onclick="event.stopPropagation(); toggleFolder('${f.id}')">
                        <div class="folder-checkbox ${checkedClass}"></div>
                        <div style="font-size:1.2rem;">📁</div>
                        <div style="font-size:0.95rem;color:#fff;">${f.name}</div>
                    </div>
                `;

                fullHtml += rowHtml;
                if (isVisible) html += rowHtml;
            });

            if (allFoldersList.length === 0) {
                html = '<div style="padding:10px;text-align:center;">No folders found.</div>';
                fullHtml = html;
            }

            const listEl = document.getElementById('list-folders');
            if (listEl) listEl.innerHTML = html;

            const listFullEl = document.getElementById('list-full-folders');
            if (listFullEl) listFullEl.innerHTML = fullHtml;
        }

        function updateSubmitButton() {
            const btn = document.getElementById('btn-submit-folders');
            const hasSelection = allFoldersList.some(f => f.checked);

            if (folderPickerMode === 'full' || hasSelection) {
                btn.disabled = false;
            } else {
                btn.disabled = true;
            }
        }

        async function submitFolderTarget() {
            const selectedFolders = allFoldersList.filter(f => f.checked);
            if (selectedFolders.length === 0 && folderPickerMode !== 'full') return;

            const btn = document.getElementById('btn-submit-folders');
            btn.disabled = true;
            btn.innerText = 'Connecting...';

            const accessType = folderPickerMode === 'full' ? 'full_access' : 'specific_folders';

            try {
                // Send a unified payload to the backend
                const res = await fetch("/api/onedrive/connect-folders-batch", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        access_type: accessType,
                        folders: selectedFolders.map(f => ({
                            folder_id: f.id,
                            name: f.name,
                            drive_id: f.drive_id,
                            item_id: f.item_id
                        }))
                    })
                });

                const contentType = res.headers.get("content-type");
                let data = null;
                if (contentType && contentType.indexOf("application/json") !== -1) {
                    data = await res.json();
                }

                if (res.ok) {
                    loadUser(); // Refresh UI
                } else {
                    alert("Failed to connect folders: " + (data ? JSON.stringify(data) : res.statusText));
                    btn.disabled = false;
                    btn.innerText = 'Continue';
                }
            } catch (err) {
                console.error(err);
                alert("Error connecting folders");
                btn.disabled = false;
                btn.innerText = 'Continue';
            }
        }

        let activeFolderId = null;

        function showConnectedUI() {
            const container = document.getElementById("onedrive-content");
            const folders = currentUser.connected_folders || [];

            if (folders.length === 0) {
                showFolderPicker();
                return;
            }

            let html = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h3 style="font-size: 1.2rem; font-weight: 600;">Your Connected Folders</h3>
                    <button onclick="showFolderPicker()" class="connect-btn" style="padding: 8px 16px; font-size: 0.85rem;">
                        + Connect Another Folder
                    </button>
                </div>
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; margin-bottom: 32px;">
            `;

            folders.forEach((f, idx) => {
                html += `
                    <div class="folder-setup-card" style="padding: 20px; cursor: pointer; transition: all 0.2s;" 
                         onclick="selectActiveFolder('${f.item_id}', '${f.folder_name}')" id="card-${f.item_id}">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px;">
                            <div style="font-size: 24px;">📁</div>
                            <button onclick="event.stopPropagation(); disconnectFolder('${f.item_id}')" 
                                    style="background: transparent; border: 1px solid rgba(255,80,80,0.3); color: #ff6b6b; padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; transition: all 0.2s;">
                                Disconnect
                            </button>
                        </div>
                        <div style="font-weight: 600; font-size: 1rem; color: #fff; margin-bottom: 4px; word-break: break-all;">${f.folder_name}</div>
                        <div style="font-size: 0.8rem; color: #69f0ae;">✓ Active Sync</div>
                    </div>
                `;
            });

            html += `
                </div>
                <div id="active-folder-view" style="display: none; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 32px;">
                    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;">
                        <h3 style="font-size: 1.1rem; font-weight: 600; margin: 0;" id="active-folder-title">📄 Files</h3>
                        <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer; color: rgba(255,255,255,0.7);">
                            <input type="checkbox" id="recursive-toggle" onchange="fetchConnectedFiles()" style="accent-color: #0078D4;">
                            Show files in subfolders
                        </label>
                    </div>
                    <div id="file-results"><div style="opacity: 0.6; padding: 20px 0;">Select a folder above to view files...</div></div>
                </div>
            `;

            container.innerHTML = html;

            // Automatically select the first folder if none active
            if (folders.length > 0) {
                if (!activeFolderId || !folders.find(f => f.item_id === activeFolderId)) {
                    activeFolderId = folders[0].item_id;
                    selectActiveFolder(activeFolderId, folders[0].folder_name);
                } else {
                    // Re-select currently active one
                    const activeFolder = folders.find(f => f.item_id === activeFolderId);
                    selectActiveFolder(activeFolderId, activeFolder.folder_name);
                }
            }
        }

        function selectActiveFolder(folderId, folderName) {
            activeFolderId = folderId;

            // Highlight the selected card
            document.querySelectorAll('[id^="card-"]').forEach(el => {
                el.style.border = '1px solid rgba(255, 255, 255, 0.08)';
                el.style.background = 'rgba(255, 255, 255, 0.03)';
            });
            const selectedCard = document.getElementById(`card-${folderId}`);
            if (selectedCard) {
                selectedCard.style.border = '1px solid #0078D4';
                selectedCard.style.background = 'rgba(0, 120, 212, 0.1)';
            }

            // Show the files view
            document.getElementById('active-folder-view').style.display = 'block';
            document.getElementById('active-folder-title').innerText = `📄 Files in ${folderName}`;

            fetchConnectedFiles();
        }

        async function fetchConnectedFiles() {
            if (!activeFolderId) return;

            try {
                const isRecursive = document.getElementById('recursive-toggle')?.checked || false;
                const url = `/api/onedrive/files?folder_id=${activeFolderId}${isRecursive ? '&recursive=true' : ''}`;

                document.getElementById('file-results').innerHTML = '<div style="opacity: 0.6; padding: 20px 0;">Loading files...</div>';

                const res = await fetch(url);
                const data = await res.json();

                const container = document.getElementById('file-results');
                if (data.files && data.files.length > 0) {
                    let html = '<div class="file-list">';
                    data.files.forEach(f => {
                        const icon = f.folder ? '📁' : '📄';
                        const isFolder = !!f.folder;

                        html += `
                            <div class="file-item">
                                <div style="display: flex; align-items: center;">
                                    <div class="file-icon-small">${icon}</div>
                                    <div>
                                        <div class="file-name-small">${f.name}</div>
                                        <div class="file-meta-small">${f.size || 0} bytes ${f.parentReference && f.parentReference.path ? ` • ${f.parentReference.path.replace('/drive/root:/', '').split('/').pop()}` : ''}</div>
                                    </div>
                                </div>
                                ${!isFolder ? `<a href="/api/onedrive/download/${f.id}" class="download-btn" target="_blank">Download</a>` : '<span style="color: rgba(255,255,255,0.3); font-size: 0.8rem;">Folder</span>'}
                            </div>
                        `;
                    });
                    html += '</div>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div style="padding: 32px; text-align: center; opacity: 0.6; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px dashed rgba(255,255,255,0.1);">This folder is empty.</div>';
                }
            } catch (err) {
                document.getElementById('file-results').innerHTML = '<div style="color: #ff5252;">Failed to load files.</div>';
            }
        }

        async function disconnectFolder(folderId) {
            try {
                const btn = document.querySelector(`#card-${folderId} button`);
                if (btn) btn.innerText = 'Removing...';

                const res = await fetch("/api/onedrive/disconnect", {
                    method: "POST",
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ folder_id: folderId })
                });

                if (res.ok) {
                    if (activeFolderId === folderId) activeFolderId = null;
                    loadUser();
                } else {
                    alert("Failed to disconnect folder");
                    if (btn) btn.innerText = 'Disconnect';
                }
            } catch (err) {
                alert("Error disconnecting folder");
            }
        }

        loadUser();
    </script>
</body>

</html>
