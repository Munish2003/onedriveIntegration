<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — SalezX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('/static/bg.png') center center / cover no-repeat;
            overflow: hidden;
            position: relative;
        }

        /* Soft white overlay so card stands out */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(245, 247, 250, 0.72);
            z-index: 0;
        }

        /* Animated soft blobs on top of background */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.22;
            animation: drift 10s ease-in-out infinite;
            z-index: 1;
        }
        .blob-1 { width: 500px; height: 500px; background: #c7d2fe; top: -150px; left: -150px; }
        .blob-2 { width: 350px; height: 350px; background: #bae6fd; bottom: -100px; right: -80px; animation-delay: -4s; }
        .blob-3 { width: 250px; height: 250px; background: #fde68a; top: 55%; left: 65%; animation-delay: -7s; }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            40%       { transform: translate(25px, -20px) scale(1.06); }
            70%       { transform: translate(-15px, 18px) scale(0.94); }
        }

        /* Card */
        .card {
            position: relative;
            z-index: 3;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            padding: 48px 40px;
            width: 420px;
            max-width: 92vw;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
            animation: card-in 0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(28px) scale(0.97);
        }
        @keyframes card-in {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo */
        .logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 22px;
            background: linear-gradient(135deg, #6366f1, #38bdf8);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.25);
            animation: logo-pop 0.6s 0.15s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }
        @keyframes logo-pop {
            from { opacity: 0; transform: scale(0.6) rotate(-12deg); }
            to   { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        .logo svg { width: 26px; height: 26px; fill: #fff; }

        h1 {
            color: #111827;
            font-size: 1.55rem;
            font-weight: 700;
            margin-bottom: 8px;
            animation: fade-up 0.5s 0.25s backwards;
        }
        .subtitle {
            color: #6b7280;
            font-size: 0.92rem;
            margin-bottom: 36px;
            line-height: 1.6;
            animation: fade-up 0.5s 0.35s backwards;
        }
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Microsoft button */
        .ms-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px 28px;
            background: #fff;
            color: #3c3c3c;
            font-family: 'Segoe UI', 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s, background 0.2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 260px;
            animation: fade-up 0.5s 0.45s backwards;
        }
        .ms-btn:hover {
            background: #f9fafb;
            border-color: #9ca3af;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        .ms-btn:active { transform: translateY(0); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .ms-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

        .footer-text {
            margin-top: 28px;
            color: #9ca3af;
            font-size: 0.78rem;
            animation: fade-up 0.5s 0.55s backwards;
        }
    </style>
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="card">
        <div class="logo">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <h1>Welcome to SalezX</h1>
        <p class="subtitle">Sign in with your Microsoft account to access your OneDrive integration dashboard.</p>

        <a href="http://127.0.0.1:8000/onedrive/connect" class="ms-btn" id="signin-btn">
            <svg viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
                <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
                <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
                <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
                <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
            </svg>
            Sign in with Microsoft
        </a>

        <p class="footer-text">Secured by Microsoft Identity Platform</p>
    </div>
</body>
</html>
